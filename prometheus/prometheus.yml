global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "smart-energy-monitor"
    environment: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:
  # ── Energy Monitoring API ──────────────────────────────────────────
  - job_name: "energy-api"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["energy-api:8000"]
        labels:
          service: "energy-api"
          component: "iot-gateway"

  # ── Prometheus self-monitoring ─────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          component: "monitoring"
