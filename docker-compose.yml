version: "3.9"

# ═══════════════════════════════════════════════════════════════════
#  Smart Energy Monitoring System v3 — Complete Stack
#  Copy .env.example to .env and fill in secrets before running.
# ═══════════════════════════════════════════════════════════════════

networks:
  energy-net:
    driver: bridge

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:

services:

  # ── MongoDB ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - energy-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── FastAPI Energy API ────────────────────────────────────────────
  energy-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: energy-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      MONGO_DB:  ${MONGO_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-60}
      REFRESH_TOKEN_TTL_DAYS:   ${REFRESH_TOKEN_TTL_DAYS:-30}
    networks:
      - energy-net
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - energy-net
    depends_on:
      energy-api:
        condition: service_healthy

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - energy-net
    depends_on:
      - prometheus
